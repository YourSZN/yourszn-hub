<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your SZN — Client Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  :root {
    --cream: #FAF7F2; --warm: #F5F0E8; --sand: #E0D5C5;
    --tan: #C4B49A; --brown: #6B5B4E; --deep: #3E3229;
    --charcoal: #2C2420; --green: #5A8A5E; --rose: #C47272;
    --gold: #C4963A; --muted: #9A8E82;
    /* Season icon colours from branding */
    --icon-winter: #9E9E9E;
    --icon-spring: #A8C8E8;
    --icon-summer: #C8A8D8;
    --icon-autumn: #D4B896;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--charcoal); color: var(--charcoal);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ─── Hero / Header ─── */
  .portal-hero {
    background: var(--charcoal);
    padding: 60px 20px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .portal-hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(100,85,70,0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  .portal-logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 48px;
    font-weight: 400;
    color: rgba(255,255,255,0.12);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 6px;
    position: relative;
  }
  .portal-logo .your { font-weight: 400; }
  .portal-logo .szn { font-weight: 700; }

  /* Season icons row */
  .portal-icons {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 20px;
    position: relative;
  }
  .portal-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s ease;
  }
  .portal-icon:hover { transform: scale(1.1); }
  .portal-icon svg { width: 24px; height: 24px; }

  .portal-subtitle {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-top: 24px;
    position: relative;
  }

  /* ─── Cards section ─── */
  .portal-body {
    flex: 1;
    background: var(--cream);
    padding: 40px 20px 60px;
    border-radius: 24px 24px 0 0;
    margin-top: -12px;
    position: relative;
    z-index: 1;
  }
  .portal-cards {
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Card */
  .portal-card {
    background: white;
    border: 1px solid var(--sand);
    border-radius: 14px;
    padding: 24px 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    overflow: hidden;
  }
  .portal-card:hover {
    border-color: var(--tan);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(44,36,32,0.08);
  }
  .portal-card-inner {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .portal-card-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .portal-card-icon svg { width: 26px; height: 26px; }
  .portal-card-text { flex: 1; min-width: 0; }
  .portal-card-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px; font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 4px;
  }
  .portal-card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }
  .portal-card-arrow {
    color: var(--tan);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .portal-card:hover .portal-card-arrow { transform: translateX(3px); }

  /* Vietnam card expand */
  .portal-card.has-gate { cursor: pointer; }
  .portal-gate {
    display: none;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--sand);
  }
  .portal-gate.open { display: block; }
  .portal-gate-field {
    margin-bottom: 12px;
  }
  .portal-gate-label {
    display: block; font-size: 11px; font-weight: 600; color: var(--brown);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
  }
  .portal-gate-input {
    width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--sand);
    font-size: 14px; background: white; color: var(--charcoal); outline: none;
    transition: border-color 0.15s;
  }
  .portal-gate-input:focus { border-color: var(--brown); }
  .portal-gate-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none;
    background: var(--charcoal); color: white;
    transition: background 0.15s;
  }
  .portal-gate-btn:hover { background: var(--deep); }
  .portal-gate-error {
    background: #FEF2F2; border: 1px solid #FECACA; color: #B91C1C;
    padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 12px;
    display: none;
  }

  /* Footer */
  .portal-footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 0 20px 30px;
    background: var(--cream);
  }

  /* Spinner */
  .portal-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--sand); border-top-color: white;
    border-radius: 50%; animation: pspin 0.6s linear infinite;
  }
  @keyframes pspin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 480px) {
    .portal-logo { font-size: 36px; }
    .portal-hero { padding: 40px 20px 40px; }
    .portal-body { padding: 30px 16px 50px; }
    .portal-card { padding: 20px; }
    .portal-card-icon { width: 44px; height: 44px; border-radius: 10px; }
    .portal-card-icon svg { width: 22px; height: 22px; }
    .portal-card-title { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="portal-hero">
  <div class="portal-logo">
    <span class="your">Your</span> <span class="szn">SZN</span>
  </div>

  <!-- Season Icons -->
  <div class="portal-icons">
    <!-- Winter -->
    <div class="portal-icon" style="background:var(--icon-winter);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round">
        <ellipse cx="12" cy="10" rx="6" ry="4"/>
        <line x1="6" y1="13" x2="18" y2="13"/>
        <line x1="7" y1="16" x2="17" y2="16"/>
        <line x1="8" y1="19" x2="16" y2="19"/>
      </svg>
    </div>
    <!-- Spring -->
    <div class="portal-icon" style="background:var(--icon-spring);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,32,0.6)" stroke-width="1.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/>
        <line x1="4.9" y1="19.1" x2="7" y2="17"/><line x1="17" y1="7" x2="19.1" y2="4.9"/>
        <line x1="8" y1="2.5" x2="9.5" y2="5.5"/><line x1="14.5" y1="18.5" x2="16" y2="21.5"/>
        <line x1="2.5" y1="16" x2="5.5" y2="14.5"/><line x1="18.5" y1="9.5" x2="21.5" y2="8"/>
        <line x1="2.5" y1="8" x2="5.5" y2="9.5"/><line x1="18.5" y1="14.5" x2="21.5" y2="16"/>
        <line x1="8" y1="21.5" x2="9.5" y2="18.5"/><line x1="14.5" y1="5.5" x2="16" y2="2.5"/>
      </svg>
    </div>
    <!-- Summer -->
    <div class="portal-icon" style="background:var(--icon-summer);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,32,0.6)" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 4c0 4-4 6-4 10a4 4 0 008 0c0-4-4-6-4-10z"/>
        <path d="M12 6c0 3 3 5 3 8" opacity="0.5"/>
      </svg>
    </div>
    <!-- Autumn -->
    <div class="portal-icon" style="background:var(--icon-autumn);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,32,0.6)" stroke-width="1.5" stroke-linecap="round">
        <path d="M4 17a8 8 0 0116 0"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
        <line x1="6" y1="20" x2="18" y2="20"/>
      </svg>
    </div>
  </div>

  <div class="portal-subtitle">Client Portal</div>
</div>

<!-- ═══ CARDS ═══ -->
<div class="portal-body">
  <div class="portal-cards">

    <!-- Online Colour Analysis -->
    <a href="yourszn-form-7.html" class="portal-card">
      <div class="portal-card-inner">
        <div class="portal-card-icon" style="background:var(--warm);">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--brown)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <div class="portal-card-text">
          <div class="portal-card-title">Online Colour Analysis</div>
          <div class="portal-card-desc">Complete your questionnaire &amp; upload photos</div>
        </div>
        <div class="portal-card-arrow">→</div>
      </div>
    </a>

    <!-- In-Person Booking -->
    <a href="client-upload.html" class="portal-card">
      <div class="portal-card-inner">
        <div class="portal-card-icon" style="background:var(--warm);">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--brown)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <circle cx="12" cy="16" r="2"/>
          </svg>
        </div>
        <div class="portal-card-text">
          <div class="portal-card-title">In-Person Booking</div>
          <div class="portal-card-desc">Upload photos ahead of your appointment</div>
        </div>
        <div class="portal-card-arrow">→</div>
      </div>
    </a>

    <!-- Vietnam Tour -->
    <div class="portal-card has-gate" onclick="toggleGate(event)">
      <div class="portal-card-inner">
        <div class="portal-card-icon" style="background:var(--warm);">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--brown)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="portal-card-text">
          <div class="portal-card-title">Vietnam Tour</div>
          <div class="portal-card-desc">Access your planning lookbook</div>
        </div>
        <div class="portal-card-arrow" id="gate-arrow">→</div>
      </div>

      <!-- Code gate -->
      <div class="portal-gate" id="vietnam-gate">
        <div class="portal-gate-error" id="gate-error"></div>
        <div class="portal-gate-field">
          <label class="portal-gate-label">Access Code</label>
          <input class="portal-gate-input" id="gate-code" type="text" placeholder="Enter your access code" onclick="event.stopPropagation()" />
        </div>
        <div style="text-align:right;">
          <button class="portal-gate-btn" id="gate-btn" onclick="event.stopPropagation();checkCode()">
            Continue
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="portal-footer">Your SZN &middot; Colour Analysis</div>

<script>
function toggleGate(e) {
  var gate = document.getElementById('vietnam-gate');
  if (gate.classList.contains('open')) return; /* Don't close once open */
  gate.classList.add('open');
  document.getElementById('gate-code').focus();
}

function checkCode() {
  var code = (document.getElementById('gate-code').value || '').trim();
  var errEl = document.getElementById('gate-error');

  if (!code) {
    errEl.textContent = 'Please enter your access code.';
    errEl.style.display = 'block';
    return;
  }

  if (code !== '2462') {
    errEl.textContent = 'Invalid access code. Please check and try again.';
    errEl.style.display = 'block';
    return;
  }

  /* Code correct — redirect to lookbook */
  var btn = document.getElementById('gate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="portal-spinner"></span>';
  errEl.style.display = 'none';

  window.location.href = 'https://szn-client-lookbook.netlify.app';
}

/* Allow Enter key on code input */
document.getElementById('gate-code').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); checkCode(); }
});
</script>
</body>
</html>
