<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your SZN — Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2; --warm: #F5F0E8; --sand: #E0D5C5;
    --tan: #C4B49A; --charcoal: #2C2420; --deep: #3E3229;
    --green: #5A8A5E; --rose: #C47272; --gold: #C4963A;
    --muted: #9A8E82;
    --icon-winter: #9E9E9E;
    --icon-spring: #A8C8E8;
    --icon-summer: #C8A8D8;
    --icon-autumn: #D4B896;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Almarai', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--charcoal); color: var(--charcoal);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ─── Hero ─── */
  .portal-hero {
    background: var(--charcoal);
    padding: 60px 20px 50px;
    text-align: center;
    position: relative;
  }
  .portal-hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 80%, rgba(100,85,70,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .portal-logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 52px;
    font-weight: 300;
    color: rgba(255,255,255,0.12);
    letter-spacing: 1px;
    line-height: 1;
    position: relative;
  }
  .portal-logo .szn { font-weight: 500; }

  .portal-icons {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 22px; position: relative;
  }
  .portal-icon {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s ease;
  }
  .portal-icon:hover { transform: scale(1.1); }
  .portal-icon svg { width: 22px; height: 22px; }

  .portal-subtitle {
    font-family: 'Almarai', sans-serif;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-top: 24px; position: relative;
  }

  /* ─── Body ─── */
  .portal-body {
    flex: 1;
    background: var(--cream);
    padding: 40px 20px 60px;
    border-radius: 24px 24px 0 0;
    margin-top: -12px;
    position: relative; z-index: 1;
  }
  .portal-cards {
    max-width: 580px;
    margin: 0 auto;
    display: flex; flex-direction: column;
    gap: 0;
  }

  /* Card — matching yourszn.com.au style */
  .portal-card {
    background: transparent;
    border: 1px solid var(--charcoal);
    border-bottom: none;
    padding: 28px 32px;
    cursor: pointer;
    transition: background 0.2s ease;
    text-decoration: none; color: inherit; display: block;
    position: relative;
  }
  .portal-card:first-child { border-radius: 10px 10px 0 0; }
  .portal-card:last-child { border-bottom: 1px solid var(--charcoal); border-radius: 0 0 10px 10px; }
  .portal-card:hover { background: var(--warm); }

  .portal-card-inner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .portal-card-left { flex: 1; min-width: 0; }
  .portal-card-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 26px; font-weight: 400;
    color: var(--charcoal);
    line-height: 1.2;
  }
  .portal-card-desc {
    font-family: 'Almarai', sans-serif;
    font-size: 12px; color: var(--muted);
    margin-top: 4px; line-height: 1.4;
  }
  .portal-card-link {
    font-family: 'Almarai', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--charcoal);
    text-decoration: underline;
    text-underline-offset: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }
  .portal-card:hover .portal-card-link { opacity: 0.7; }

  /* Gate (code entry) */
  .portal-gate {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--sand);
  }
  .portal-gate.open { display: block; }
  .portal-gate-row {
    display: flex; gap: 10px; align-items: flex-end;
  }
  .portal-gate-field { flex: 1; }
  .portal-gate-label {
    display: block;
    font-family: 'Almarai', sans-serif;
    font-size: 10px; font-weight: 700;
    color: var(--charcoal); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 6px;
  }
  .portal-gate-input {
    width: 100%; padding: 10px 14px; border-radius: 6px;
    border: 1px solid var(--sand);
    font-family: 'Almarai', sans-serif;
    font-size: 14px; background: white; color: var(--charcoal); outline: none;
    transition: border-color 0.15s;
  }
  .portal-gate-input:focus { border-color: var(--charcoal); }
  .portal-gate-btn {
    padding: 10px 20px; border-radius: 6px;
    font-family: 'Almarai', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; border: none;
    background: var(--charcoal); color: white;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .portal-gate-btn:hover { opacity: 0.85; }
  .portal-gate-error {
    font-family: 'Almarai', sans-serif;
    color: var(--rose); font-size: 12px;
    margin-top: 10px; display: none;
  }

  /* Footer */
  .portal-footer {
    text-align: center;
    font-family: 'Almarai', sans-serif;
    font-size: 11px; color: var(--muted);
    padding: 0 20px 30px;
    background: var(--cream);
  }

  /* Spinner */
  .portal-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: pspin 0.6s linear infinite;
  }
  @keyframes pspin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .portal-logo { font-size: 38px; }
    .portal-hero { padding: 40px 16px 40px; }
    .portal-body { padding: 30px 16px 50px; }
    .portal-card { padding: 22px 20px; }
    .portal-card-title { font-size: 22px; }
    .portal-card-link { font-size: 10px; }
    .portal-gate-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="portal-hero">
  <div class="portal-logo">
    <span class="your">Your</span><span class="szn">SZN</span>
  </div>

  <div class="portal-icons">
    <div class="portal-icon" style="background:var(--icon-winter);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.5" stroke-linecap="round">
        <ellipse cx="12" cy="10" rx="6" ry="4"/>
        <line x1="6" y1="13" x2="18" y2="13"/>
        <line x1="7" y1="16" x2="17" y2="16"/>
        <line x1="8" y1="19" x2="16" y2="19"/>
      </svg>
    </div>
    <div class="portal-icon" style="background:var(--icon-spring);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,32,0.6)" stroke-width="1.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.9" y1="4.9" x2="7" y2="7"/><line x1="17" y1="17" x2="19.1" y2="19.1"/>
        <line x1="4.9" y1="19.1" x2="7" y2="17"/><line x1="17" y1="7" x2="19.1" y2="4.9"/>
        <line x1="8" y1="2.5" x2="9.5" y2="5.5"/><line x1="14.5" y1="18.5" x2="16" y2="21.5"/>
        <line x1="2.5" y1="16" x2="5.5" y2="14.5"/><line x1="18.5" y1="9.5" x2="21.5" y2="8"/>
        <line x1="2.5" y1="8" x2="5.5" y2="9.5"/><line x1="18.5" y1="14.5" x2="21.5" y2="16"/>
        <line x1="8" y1="21.5" x2="9.5" y2="18.5"/><line x1="14.5" y1="5.5" x2="16" y2="2.5"/>
      </svg>
    </div>
    <div class="portal-icon" style="background:var(--icon-summer);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,32,0.6)" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 4c0 4-4 6-4 10a4 4 0 008 0c0-4-4-6-4-10z"/>
        <path d="M12 6c0 3 3 5 3 8" opacity="0.5"/>
      </svg>
    </div>
    <div class="portal-icon" style="background:var(--icon-autumn);">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(44,36,32,0.6)" stroke-width="1.5" stroke-linecap="round">
        <path d="M4 17a8 8 0 0116 0"/>
        <line x1="4" y1="17" x2="20" y2="17"/>
        <line x1="6" y1="20" x2="18" y2="20"/>
      </svg>
    </div>
  </div>

  <div class="portal-subtitle">Client Portal</div>
</div>

<!-- ═══ CARDS ═══ -->
<div class="portal-body">
  <div class="portal-cards">

    <!-- Online Colour Analysis -->
    <div class="portal-card" onclick="openGate('online')">
      <div class="portal-card-inner">
        <div class="portal-card-left">
          <div class="portal-card-title">Online <em>Colour</em> Analysis</div>
          <div class="portal-card-desc">Complete your questionnaire &amp; upload photos</div>
        </div>
        <div class="portal-card-link">GET STARTED</div>
      </div>
      <div class="portal-gate" id="gate-online">
        <div class="portal-gate-row">
          <div class="portal-gate-field">
            <label class="portal-gate-label">Access Code</label>
            <input class="portal-gate-input" id="code-online" type="text" placeholder="Enter your code" onclick="event.stopPropagation()" />
          </div>
          <button class="portal-gate-btn" id="btn-online" onclick="event.stopPropagation();checkCode('online')">ENTER</button>
        </div>
        <div class="portal-gate-error" id="err-online"></div>
      </div>
    </div>

    <!-- In-Person Booking -->
    <div class="portal-card" onclick="openGate('inperson')">
      <div class="portal-card-inner">
        <div class="portal-card-left">
          <div class="portal-card-title">In-Person Booking</div>
          <div class="portal-card-desc">Upload photos ahead of your appointment</div>
        </div>
        <div class="portal-card-link">UPLOAD PHOTOS</div>
      </div>
      <div class="portal-gate" id="gate-inperson">
        <div class="portal-gate-row">
          <div class="portal-gate-field">
            <label class="portal-gate-label">Access Code</label>
            <input class="portal-gate-input" id="code-inperson" type="text" placeholder="Enter your code" onclick="event.stopPropagation()" />
          </div>
          <button class="portal-gate-btn" id="btn-inperson" onclick="event.stopPropagation();checkCode('inperson')">ENTER</button>
        </div>
        <div class="portal-gate-error" id="err-inperson"></div>
      </div>
    </div>

    <!-- Vietnam Tour -->
    <div class="portal-card" onclick="openGate('vietnam')">
      <div class="portal-card-inner">
        <div class="portal-card-left">
          <div class="portal-card-title">Vietnam Tour</div>
          <div class="portal-card-desc">Access your planning lookbook</div>
        </div>
        <div class="portal-card-link">OPEN LOOKBOOK</div>
      </div>
      <div class="portal-gate" id="gate-vietnam">
        <div class="portal-gate-row">
          <div class="portal-gate-field">
            <label class="portal-gate-label">Access Code</label>
            <input class="portal-gate-input" id="code-vietnam" type="text" placeholder="Enter your code" onclick="event.stopPropagation()" />
          </div>
          <button class="portal-gate-btn" id="btn-vietnam" onclick="event.stopPropagation();checkCode('vietnam')">ENTER</button>
        </div>
        <div class="portal-gate-error" id="err-vietnam"></div>
      </div>
    </div>

  </div>
</div>

<div class="portal-footer">Your SZN &middot; Colour Analysis</div>

<script>
var CODES = {
  online: { code: '1893', url: 'yourszn-form-7.html' },
  inperson: { code: '2722', url: 'client-upload.html' },
  vietnam: { code: '2462', url: 'https://szn-client-lookbook.netlify.app' }
};

function openGate(key) {
  var gate = document.getElementById('gate-' + key);
  if (gate.classList.contains('open')) return;
  gate.classList.add('open');
  document.getElementById('code-' + key).focus();
}

function checkCode(key) {
  var input = document.getElementById('code-' + key);
  var errEl = document.getElementById('err-' + key);
  var code = (input.value || '').trim();

  if (!code) {
    errEl.textContent = 'Please enter your access code.';
    errEl.style.display = 'block';
    return;
  }

  if (code !== CODES[key].code) {
    errEl.textContent = 'Invalid access code. Please check and try again.';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  var btn = document.getElementById('btn-' + key);
  btn.disabled = true;
  btn.innerHTML = '<span class="portal-spinner"></span>';

  window.location.href = CODES[key].url;
}

/* Enter key support on all code inputs */
document.querySelectorAll('.portal-gate-input').forEach(function(input) {
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      var key = this.id.replace('code-', '');
      checkCode(key);
    }
  });
});
</script>
</body>
</html>
